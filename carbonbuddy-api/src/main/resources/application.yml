server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/css,application/javascript
    min-response-size: 1024

spring:
  datasource:
    url: jdbc:postgresql://db:5432/carbonbuddy
    username: carbonbuddy
    password: carbonbuddy_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
    open-in-view: false

app:
  jwt:
    secret: "aGVsbG9fdGhpcyBpcyBhIHZlcnkgc2VjdXJlIGtleSBmb3IgY2FyYm9uYnVkZHkgand0IHRva2VucyBwbGVhc2UgZG9udCBzaGFyZQ=="
    expiration-ms: 86400000
  seed:
    enabled: true
    user-count: 4

ocr:
  service-url: http://ocr-service:5000

nudge:
  service-url: http://nudge-engine:5001

logging:
  level:
    com.carbonbuddy: INFO
