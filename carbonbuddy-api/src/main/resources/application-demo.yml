server:
  port: 8085
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/css,application/javascript
    min-response-size: 1024

spring:
  datasource:
    url: jdbc:h2:mem:carbonbuddy;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      leak-detection-threshold: 60000
      pool-name: CarbonBuddyPool
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: "aGVsbG9fdGhpcyBpcyBhIHZlcnkgc2VjdXJlIGtleSBmb3IgY2FyYm9uYnVkZHkgand0IHRva2VucyBwbGVhc2UgZG9udCBzaGFyZQ=="
    expiration-ms: 86400000
  seed:
    enabled: true
    user-count: 4

logging:
  level:
    com.carbonbuddy: INFO
    com.zaxxer.hikari: INFO
