server:
  port: 8085

spring:
  datasource:
    url: jdbc:h2:mem:carbonbuddy;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: CarbonBuddyHikariPool
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.carbonbuddy: INFO
    com.zaxxer.hikari: INFO
