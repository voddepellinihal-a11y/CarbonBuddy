version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carbonbuddy
      POSTGRES_USER: carbonbuddy
      POSTGRES_PASSWORD: carbonbuddy_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbonbuddy -d carbonbuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./carbonbuddy-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/carbonbuddy
      SPRING_DATASOURCE_USERNAME: carbonbuddy
      SPRING_DATASOURCE_PASSWORD: carbonbuddy_secret
      OCR_SERVICE_URL: http://ocr-service:5000
      NUDGE_SERVICE_URL: http://nudge-engine:5001
    depends_on:
      db:
        condition: service_healthy

  ocr-service:
    build: ./ocr-service
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nudge-engine:
    build: ./nudge-engine
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
